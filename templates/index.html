{% extends "base.html" %}

{% block title %}
ISSP
{% endblock %}

{% block content %}

<h2>Carreras</h2>

<p>
Portal académico para consultar carreras, materias y recursos asociados.
</p>

{% for career in careers %}
<a class="card-link" href="/careers/{{ career.career_id }}">
    <div class="card">
        <h3>{{ career.career_name }}</h3>
        <p>Ver plan de estudios y materias.</p>
    </div>
</a>
{% endfor %}

{% endblock %}
